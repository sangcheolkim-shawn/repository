<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMS 검수 뷰어 — Design Concept</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --font: 'Pretendard', -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
  --bg: #F5F5F7;
  --surface: #FFFFFF;
  --border: #E5E5EA;
  --border-hover: #D1D1D6;
  --text: #1D1D1F;
  --text-sec: #636366;
  --text-muted: #8E8E93;
  --text-faint: #AEAEB2;
  --blue: #0071E3;
  --blue-bg: #E8F2FF;
  --green: #34C759;
  --green-bg: #F0FFF4;
  --green-border: #A8E6B8;
  --amber: #FF9500;
  --amber-bg: #FFF8F0;
  --amber-border: #FFD9A8;
  --red: #FF3B30;
  --red-bg: #FFF2F1;
  --red-border: #FFB3AE;
  --purple: #AF52DE;
  --purple-bg: #F3E8FF;
  --purple-border: #D9B3F0;
  --nd-bg: #E8F2FF; --nd-text: #0055B8; --nd-border: #B3D7FF;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  height: 100vh;
}

/* ═══ Layout ═══ */
.viewer {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ═══ Header ═══ */
.header {
  height: 56px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 12px;
  flex-shrink: 0;
}
.header-badge {
  font-size: 10px;
  padding: 3px 10px;
  border-radius: 6px;
  font-weight: 600;
  letter-spacing: .02em;
}
.badge-review { background: var(--purple-bg); color: var(--purple); }
.badge-system { background: var(--nd-bg); color: var(--nd-text); border: 1px solid var(--nd-border); }

.header-info { flex: 1; min-width: 0; }
.header-title {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: -0.2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.header-meta {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 1px;
  letter-spacing: -0.1px;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: auto;
}

.btn {
  padding: 7px 16px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 500;
  font-family: var(--font);
  cursor: pointer;
  transition: all .15s ease;
  border: none;
  letter-spacing: -0.1px;
}
.btn-ghost {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-sec);
}
.btn-ghost:hover { border-color: var(--border-hover); background: var(--bg); }
.btn-reject {
  background: transparent;
  border: 1px solid var(--red-border);
  color: var(--red);
}
.btn-reject:hover { background: var(--red-bg); }
.btn-approve {
  background: var(--blue);
  color: #fff;
  padding: 7px 22px;
}
.btn-approve:hover { background: #0077ED; }

.view-toggle {
  display: flex;
  border: 1px solid var(--border);
  border-radius: 7px;
  overflow: hidden;
}
.view-toggle button {
  padding: 5px 12px;
  border: none;
  font-size: 11px;
  font-weight: 500;
  font-family: var(--font);
  cursor: pointer;
  background: transparent;
  color: var(--text-muted);
  transition: all .12s;
}
.view-toggle button.active {
  background: var(--text);
  color: #fff;
}

/* ═══ Body ═══ */
.body {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ═══ Left Panel ═══ */
.left-panel {
  width: 220px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
.left-header {
  padding: 16px 16px 14px;
  border-bottom: 1px solid var(--border);
}
.left-header-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.15px;
  margin-bottom: 4px;
}
.left-header-sub {
  font-size: 10px;
  color: var(--text-faint);
}

.left-tree {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
.left-tree::-webkit-scrollbar { width: 4px; }
.left-tree::-webkit-scrollbar-thumb { background: #D1D1D6; border-radius: 4px; }

.tree-group {
  margin-bottom: 2px;
}
.tree-group-header {
  padding: 7px 10px;
  display: flex;
  align-items: center;
  gap: 6px;
  border-radius: 6px;
  cursor: pointer;
  transition: background .1s;
  user-select: none;
}
.tree-group-header:hover { background: rgba(0,0,0,.025); }
.tree-arrow {
  font-size: 8px;
  color: var(--text-faint);
  width: 12px;
  text-align: center;
  transition: transform .15s;
}
.tree-arrow.open { transform: rotate(90deg); }
.tree-group-label {
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  flex: 1;
  letter-spacing: -0.1px;
}
.tree-group-count {
  font-size: 9px;
  color: var(--text-faint);
  background: var(--bg);
  padding: 1px 6px;
  border-radius: 4px;
}
.tree-items { padding-left: 8px; }
.tree-item {
  padding: 5px 10px;
  margin-bottom: 1px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-radius: 5px;
  cursor: pointer;
  transition: all .08s;
}
.tree-item:hover { background: rgba(0,0,0,.02); }
.tree-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: #D1D1D6;
  flex-shrink: 0;
}
.tree-item-label {
  font-size: 11px;
  font-weight: 400;
  color: var(--text-sec);
  flex: 1;
}
.tree-item.active {
  background: rgba(0, 113, 227, .06);
}
.tree-item.active .tree-dot { background: var(--blue); }
.tree-item.active .tree-item-label {
  font-weight: 600;
  color: var(--blue);
}

.left-nav {
  padding: 10px 12px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 6px;
}
.left-nav button {
  flex: 1;
  padding: 6px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: transparent;
  font-size: 11px;
  font-weight: 500;
  font-family: var(--font);
  color: var(--text-muted);
  cursor: pointer;
  transition: all .12s;
}
.left-nav button:hover { border-color: var(--border-hover); color: var(--text-sec); }

/* ═══ Content Area ═══ */
.content-area {
  flex: 1;
  overflow-y: auto;
  padding: 24px 32px;
  min-width: 0;
}
.content-area::-webkit-scrollbar { width: 6px; }
.content-area::-webkit-scrollbar-thumb { background: #D1D1D6; border-radius: 6px; }

.content-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
}
.content-set-label {
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.3px;
}
.content-count {
  font-size: 12px;
  color: var(--text-faint);
  letter-spacing: -0.1px;
}
.content-status {
  margin-left: auto;
  font-size: 11px;
  padding: 4px 12px;
  border-radius: 6px;
  font-weight: 600;
}
.status-complete { background: var(--green-bg); color: #1B8A3E; border: 1px solid var(--green-border); }
.status-incomplete { background: var(--amber-bg); color: #B35C00; border: 1px solid var(--amber-border); }

/* ═══ Media Strip ═══ */
.media-strip {
  margin-bottom: 20px;
  padding: 14px 16px;
  background: var(--surface);
  border-radius: 10px;
  border: 1px solid var(--border);
}
.media-strip-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
  letter-spacing: -0.1px;
}
.media-strip-count {
  font-weight: 400;
  color: var(--text-faint);
}
.media-chips {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.media-chip {
  padding: 8px 12px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  transition: all .12s ease;
  max-width: 260px;
  border: 1px solid;
}
.media-chip:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(0,0,0,.06);
}
.media-chip-video { background: #FAFAFE; border-color: #E5E5F0; }
.media-chip-audio { background: #FFFAF5; border-color: #F0E5D8; }
.media-chip-image { background: #F5FAFF; border-color: #D8E8F0; }
.media-chip-icon { font-size: 16px; flex-shrink: 0; }
.media-chip-info { min-width: 0; flex: 1; }
.media-chip-name {
  font-size: 10px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: -0.1px;
}
.media-chip-duration {
  font-size: 9px;
  color: var(--text-faint);
  margin-top: 1px;
}
.media-chip-arrow {
  color: var(--text-faint);
  font-size: 10px;
  flex-shrink: 0;
}

/* ═══ Card Grid ═══ */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
  gap: 12px;
}
.item-card {
  background: var(--surface);
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--border);
  transition: box-shadow .15s ease;
}
.item-card:hover {
  box-shadow: 0 2px 12px rgba(0,0,0,.05);
}
.item-card.has-issue {
  border-color: var(--amber-border);
}
.card-header {
  padding: 10px 16px;
  background: #FAFAFA;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-num {
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.1px;
}
.card-label {
  font-size: 12px;
  color: var(--text-sec);
  letter-spacing: -0.1px;
}
.card-issue-badge {
  margin-left: auto;
  font-size: 9px;
  padding: 2px 7px;
  border-radius: 4px;
  background: var(--amber);
  color: #fff;
  font-weight: 600;
}
.card-body {
  padding: 6px 16px 10px;
}
.field-row {
  display: flex;
  align-items: baseline;
  gap: 10px;
  padding: 6px 0;
  border-bottom: 1px solid #F2F2F4;
}
.field-row:last-child { border-bottom: none; }
.field-label {
  font-size: 11px;
  color: var(--text-faint);
  width: 72px;
  flex-shrink: 0;
  font-weight: 400;
  letter-spacing: -0.05px;
}
.field-required::after {
  content: ' *';
  color: var(--red);
}
.field-value {
  flex: 1;
  font-size: 12px;
  color: var(--text);
  word-break: break-all;
  letter-spacing: -0.1px;
  line-height: 1.45;
}
.field-value.empty { color: var(--red); font-style: italic; font-size: 11px; }
.field-value.optional-empty { color: var(--text-faint); font-style: italic; font-size: 11px; }
.field-value.media {
  color: var(--blue);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
}
.field-value.media:hover { text-decoration: underline; }
.media-tag {
  font-size: 9px;
  color: var(--text-faint);
  font-style: normal;
}

/* ═══ Table View ═══ */
.table-wrap {
  overflow-x: auto;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--surface);
}
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.data-table thead th {
  padding: 9px 12px;
  text-align: left;
  font-weight: 600;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
  font-size: 10px;
  letter-spacing: .02em;
  white-space: nowrap;
  background: #FAFAFA;
  position: sticky;
  top: 0;
}
.data-table tbody td {
  padding: 8px 12px;
  border-bottom: 1px solid #F5F5F7;
  color: var(--text);
  letter-spacing: -0.1px;
}
.data-table tbody tr:hover { background: #FAFAFA; }
.data-table tbody tr.row-issue { background: #FFFBF5; }
.data-table tbody tr.row-issue:hover { background: #FFF6E8; }
.td-num { font-weight: 600; width: 40px; }
.td-empty { color: var(--red); font-style: italic; }
.td-media { color: var(--blue); cursor: pointer; }
.td-media:hover { text-decoration: underline; }

/* ═══ Media Modal ═══ */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 100;
  background: rgba(0,0,0,.55);
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fadeIn .12s ease;
  backdrop-filter: blur(4px);
}
.modal-overlay.hidden { display: none; }
.modal-box {
  background: #fff;
  border-radius: 14px;
  max-width: 720px;
  width: 88%;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 24px 80px rgba(0,0,0,.25);
}
.modal-header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
.modal-icon { font-size: 20px; }
.modal-info { flex: 1; min-width: 0; }
.modal-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.15px;
}
.modal-subtitle {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 1px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.modal-close {
  width: 28px; height: 28px;
  border: none;
  border-radius: 7px;
  background: var(--bg);
  color: var(--text-muted);
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .12s;
}
.modal-close:hover { background: #E5E5EA; color: var(--text); }
.modal-body {
  flex: 1;
  padding: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
}

/* Video player mockup */
.video-player {
  width: 100%;
  max-width: 600px;
}
.video-screen {
  background: #1D1D1F;
  border-radius: 10px;
  aspect-ratio: 16/9;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.play-btn {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: rgba(255,255,255,.15);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all .15s;
}
.play-btn:hover { background: rgba(255,255,255,.25); transform: scale(1.05); }
.play-btn svg { margin-left: 3px; }
.video-title-overlay {
  position: absolute;
  bottom: 12px; left: 14px;
  font-size: 11px;
  color: rgba(255,255,255,.6);
  font-weight: 500;
}
.video-controls {
  margin-top: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.ctrl-play {
  padding: 5px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  font-size: 10px;
  font-weight: 500;
  color: var(--text-sec);
  cursor: pointer;
  font-family: var(--font);
  display: flex;
  align-items: center;
  gap: 4px;
}
.progress-bar {
  flex: 1;
  height: 3px;
  background: #E5E5EA;
  border-radius: 2px;
  position: relative;
}
.progress-fill {
  height: 100%;
  background: var(--blue);
  border-radius: 2px;
  width: 0;
  transition: width .3s;
}
.ctrl-time {
  font-size: 10px;
  color: var(--text-faint);
  font-weight: 500;
  font-variant-numeric: tabular-nums;
}

/* Audio player mockup */
.audio-player {
  text-align: center;
  width: 100%;
  max-width: 400px;
}
.audio-viz {
  width: 88px; height: 88px;
  border-radius: 50%;
  background: linear-gradient(135deg, #E8F2FF 0%, #F3E8FF 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 16px;
}
.audio-bars {
  display: flex;
  align-items: center;
  gap: 3px;
  height: 32px;
}
.audio-bar {
  width: 3px;
  border-radius: 2px;
  background: var(--blue);
  animation: audioWave 1.2s ease-in-out infinite;
}
.audio-bar:nth-child(1) { height: 40%; animation-delay: 0s; }
.audio-bar:nth-child(2) { height: 70%; animation-delay: .15s; }
.audio-bar:nth-child(3) { height: 100%; animation-delay: .3s; }
.audio-bar:nth-child(4) { height: 60%; animation-delay: .45s; }
.audio-bar:nth-child(5) { height: 80%; animation-delay: .6s; }
@keyframes audioWave {
  0%, 100% { transform: scaleY(1); }
  50% { transform: scaleY(.5); }
}
.audio-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 3px;
  letter-spacing: -0.15px;
}
.audio-sub {
  font-size: 10px;
  color: var(--text-faint);
  margin-bottom: 16px;
}
.audio-controls {
  display: flex;
  align-items: center;
  gap: 12px;
}
.audio-play {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: none;
  background: var(--blue);
  color: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background .12s;
}
.audio-play:hover { background: #0077ED; }
.audio-play svg { margin-left: 2px; }

/* Image viewer mockup */
.image-viewer {
  text-align: center;
}
.image-placeholder {
  background: #E8E8ED;
  border-radius: 10px;
  padding: 40px 60px;
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}
.image-placeholder svg { opacity: .5; }
.image-label {
  font-size: 11px;
  color: var(--text-sec);
  font-weight: 500;
}
.image-sub {
  font-size: 10px;
  color: var(--text-faint);
}

/* ═══ Animations ═══ */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
</style>
</head>
<body>

<div class="viewer">
  <!-- ═══ Header ═══ -->
  <div class="header">
    <span class="header-badge badge-review">검수</span>
    <span class="header-badge badge-system">뉴드림스</span>
    <div class="header-info">
      <div class="header-title">수학 기초 과정</div>
      <div class="header-meta">A 해답지 양식 · 홍길동</div>
    </div>
    <div class="header-actions">
      <div class="view-toggle" id="viewToggle">
        <button class="active" onclick="switchView('card')">카드</button>
        <button onclick="switchView('table')">테이블</button>
      </div>
      <button class="btn btn-reject" onclick="handleReject()">반려</button>
      <button class="btn btn-approve" onclick="handleApprove()">검수 승인</button>
      <button class="btn btn-ghost" onclick="alert('닫기')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13" style="vertical-align:-2px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        닫기
      </button>
    </div>
  </div>

  <!-- ═══ Body ═══ -->
  <div class="body">

    <!-- Left Panel -->
    <div class="left-panel">
      <div class="left-header">
        <div class="left-header-title">검수 항목</div>
        <div class="left-header-sub">40 세트 · 범위 1~40</div>
      </div>
      <div class="left-tree" id="leftTree"></div>
      <div class="left-nav">
        <button onclick="navPrev()">← 이전</button>
        <button onclick="navNext()">다음 →</button>
      </div>
    </div>

    <!-- Content -->
    <div class="content-area" id="contentArea"></div>
  </div>
</div>

<!-- ═══ Media Modal ═══ -->
<div class="modal-overlay hidden" id="mediaModal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box" id="modalBox"></div>
</div>

<script>
// ═══ State ═══
var state = {
  selectedSet: 0,
  expandedGroups: {0:true, 1:false, 2:false, 3:false},
  view: 'card'
};

// ═══ Sample Data ═══
var FIELDS = [
  {key:'contentType', label:'카테고리', required:true},
  {key:'page', label:'페이지', required:true},
  {key:'mainQ', label:'대문항', required:true},
  {key:'subQ', label:'소문항', required:true},
  {key:'answerForm', label:'해답형태', required:true},
  {key:'answer', label:'해답내용', required:true},
  {key:'explain', label:'해설', required:true},
  {key:'imageFile', label:'이미지', required:false},
  {key:'fileName', label:'영상파일', required:false},
  {key:'audioFile', label:'음성파일', required:false},
];

var DATA = [
  {contentType:'해답', page:'002', mainQ:'001', subQ:'000', answerForm:'텍스트',
   answer:'①, ③',
   explain:'글쓴이는 처음에는 평균대에서 떨어져서 창피했지만 친구들의 응원에 용기를 얻어 무사히 성공한 뒤의 뿌듯한 마음을 글로 썼다.',
   imageFile:'M1_001_answer.png',
   fileName:'NH_M1_01_C01_V01.mp4',
   audioFile:'M1_001_narration.mp3'
  },
  {contentType:'해답', page:'002', mainQ:'002', subQ:'000', answerForm:'텍스트',
   answer:'세드릭',
   explain:'세드릭의 착한 마음은 하긴스네와 할아버지 등 주위 사람들에게 큰 힘이 되어 주었다.',
   imageFile:'', fileName:'', audioFile:''
  },
  {contentType:'해답', page:'002', mainQ:'003', subQ:'000', answerForm:'이미지',
   answer:'①, ②',
   explain:'',
   imageFile:'M1_003_explain.jpg',
   fileName:'', audioFile:''
  },
];

// ═══ Tree Groups ═══
var GROUPS = [
  {label:'과정 1', sets: Array.from({length:10}, function(_,i){return i+1;})},
  {label:'과정 2', sets: Array.from({length:10}, function(_,i){return i+11;})},
  {label:'과정 3', sets: Array.from({length:10}, function(_,i){return i+21;})},
  {label:'과정 4', sets: Array.from({length:10}, function(_,i){return i+31;})},
];

// ═══ Detect media type ═══
function detectMedia(key, val) {
  if(!val || val.trim()==='') return null;
  var lo = val.toLowerCase();
  if(key==='imageFile' || key==='thumbFile') return 'image';
  if(lo.match(/\.(png|jpg|jpeg|gif|svg|webp)$/)) return 'image';
  if(key==='mp4File' || key==='videoFile') return 'video';
  if(lo.match(/\.(mp4|mov|webm|mkv)$/)) return 'video';
  if(key==='fileName' && lo.match(/\.(mp4|mov)$/)) return 'video';
  if(key==='audioFile' || key==='mp3File') return 'audio';
  if(lo.match(/\.(mp3|wav|aac|ogg)$/)) return 'audio';
  return null;
}

// ═══ Render Tree ═══
function renderTree() {
  var el = document.getElementById('leftTree');
  var h = '';
  GROUPS.forEach(function(g, gi) {
    var isOpen = !!state.expandedGroups[gi];
    h += '<div class="tree-group">';
    h += '<div class="tree-group-header" onclick="toggleGroup('+gi+')">';
    h += '<span class="tree-arrow '+(isOpen?'open':'')+'">&#9654;</span>';
    h += '<span class="tree-group-label">'+g.label+'</span>';
    h += '<span class="tree-group-count">'+g.sets.length+'</span>';
    h += '</div>';
    if(isOpen) {
      h += '<div class="tree-items">';
      g.sets.forEach(function(s) {
        var idx = s - 1;
        var isActive = state.selectedSet === idx;
        h += '<div class="tree-item '+(isActive?'active':'')+'" onclick="selectSet('+idx+')">';
        h += '<span class="tree-dot"></span>';
        h += '<span class="tree-item-label">'+s+'세트</span>';
        h += '</div>';
      });
      h += '</div>';
    }
    h += '</div>';
  });
  el.innerHTML = h;
}

function toggleGroup(gi) {
  state.expandedGroups[gi] = !state.expandedGroups[gi];
  renderTree();
}

function selectSet(idx) {
  state.selectedSet = idx;
  renderTree();
  renderContent();
}

function navPrev() {
  if(state.selectedSet > 0) {
    state.selectedSet--;
    autoExpandGroup();
    renderTree();
    renderContent();
  }
}
function navNext() {
  if(state.selectedSet < 39) {
    state.selectedSet++;
    autoExpandGroup();
    renderTree();
    renderContent();
  }
}
function autoExpandGroup() {
  GROUPS.forEach(function(g, gi) {
    var inGroup = g.sets.indexOf(state.selectedSet + 1) >= 0;
    if(inGroup) state.expandedGroups[gi] = true;
  });
}

// ═══ Render Content ═══
function renderContent() {
  var area = document.getElementById('contentArea');
  var setNum = state.selectedSet + 1;

  // Collect media
  var mediaList = [];
  DATA.forEach(function(row, ri) {
    FIELDS.forEach(function(f) {
      var val = row[f.key];
      var mtype = detectMedia(f.key, val);
      if(mtype) mediaList.push({row:ri, field:f, val:val, type:mtype});
    });
  });

  var filledCount = 0;
  DATA.forEach(function(row) {
    var ok = true;
    FIELDS.forEach(function(f) { if(f.required && !row[f.key]) ok = false; });
    if(ok) filledCount++;
  });
  var allFilled = filledCount === DATA.length;

  var h = '';

  // Header
  h += '<div class="content-header">';
  h += '<span class="content-set-label">'+setNum+'세트</span>';
  h += '<span class="content-count">'+DATA.length+'건 항목</span>';
  h += '<span class="content-status '+(allFilled ? 'status-complete' : 'status-incomplete')+'">';
  h += '입력 완성 '+filledCount+'/'+DATA.length+'</span>';
  h += '</div>';

  // Media strip
  if(mediaList.length > 0) {
    h += '<div class="media-strip">';
    h += '<div class="media-strip-title">';
    h += '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="14" height="14" style="color:var(--blue)"><rect x="2" y="3" width="20" height="14" rx="2"/><polygon points="10,8 16,10 10,12"/><line x1="2" y1="20" x2="22" y2="20"/></svg>';
    h += '첨부 미디어 <span class="media-strip-count">('+mediaList.length+'건)</span></div>';
    h += '<div class="media-chips">';
    mediaList.forEach(function(mi) {
      var icons = {image:'🖼️', video:'🎥', audio:'🎧'};
      var cls = 'media-chip-'+mi.type;
      h += '<div class="media-chip '+cls+'" onclick="openMedia(\''+mi.type+'\',\''+mi.val+'\')">';
      h += '<span class="media-chip-icon">'+icons[mi.type]+'</span>';
      h += '<div class="media-chip-info">';
      h += '<div class="media-chip-name">'+mi.val+'</div>';
      if(mi.type !== 'image') h += '<div class="media-chip-duration">#'+(mi.row+1)+' '+mi.field.label+'</div>';
      h += '</div>';
      h += '<span class="media-chip-arrow">&#8250;</span>';
      h += '</div>';
    });
    h += '</div></div>';
  }

  if(state.view === 'card') {
    h += '<div class="card-grid">';
    DATA.forEach(function(row, ri) {
      var hasIssue = false;
      FIELDS.forEach(function(f) { if(f.required && !row[f.key]) hasIssue = true; });
      h += '<div class="item-card'+(hasIssue?' has-issue':'')+'">';
      h += '<div class="card-header">';
      h += '<span class="card-num">#'+(ri+1)+'</span>';
      if(row[FIELDS[0].key]) h += '<span class="card-label">'+row[FIELDS[0].key]+'</span>';
      if(hasIssue) h += '<span class="card-issue-badge">미입력</span>';
      h += '</div>';
      h += '<div class="card-body">';
      FIELDS.forEach(function(f) {
        var val = row[f.key];
        var isEmpty = !val || val.trim() === '';
        var mtype = detectMedia(f.key, val);
        h += '<div class="field-row">';
        h += '<span class="field-label'+(f.required?' field-required':'')+'">'+f.label+'</span>';
        if(isEmpty && f.required) {
          h += '<span class="field-value empty">미입력</span>';
        } else if(isEmpty) {
          h += '<span class="field-value optional-empty">—</span>';
        } else if(mtype) {
          var ic = {image:'🖼️', video:'🎥', audio:'🎧'};
          h += '<span class="field-value media" onclick="openMedia(\''+mtype+'\',\''+val+'\')">';
          h += ic[mtype]+' '+val+' <span class="media-tag">미리보기</span></span>';
        } else {
          h += '<span class="field-value">'+val+'</span>';
        }
        h += '</div>';
      });
      h += '</div></div>';
    });
    h += '</div>';
  } else {
    h += '<div class="table-wrap">';
    h += '<table class="data-table"><thead><tr>';
    h += '<th>#</th>';
    FIELDS.forEach(function(f) {
      h += '<th>'+f.label+(f.required?' *':'')+'</th>';
    });
    h += '</tr></thead><tbody>';
    DATA.forEach(function(row, ri) {
      var hasIssue = false;
      FIELDS.forEach(function(f) { if(f.required && !row[f.key]) hasIssue = true; });
      h += '<tr class="'+(hasIssue?'row-issue':'')+'">';
      h += '<td class="td-num">'+(ri+1)+'</td>';
      FIELDS.forEach(function(f) {
        var val = row[f.key];
        var isEmpty = !val || val.trim() === '';
        var mtype = detectMedia(f.key, val);
        if(mtype && !isEmpty) {
          var ic = {image:'🖼️', video:'🎥', audio:'🎧'};
          h += '<td class="td-media" onclick="openMedia(\''+mtype+'\',\''+val+'\')">'+ic[mtype]+' '+val+'</td>';
        } else if(isEmpty && f.required) {
          h += '<td class="td-empty">미입력</td>';
        } else if(isEmpty) {
          h += '<td style="color:var(--text-faint);font-style:italic">—</td>';
        } else {
          h += '<td>'+val+'</td>';
        }
      });
      h += '</tr>';
    });
    h += '</tbody></table></div>';
  }
  area.innerHTML = h;
}

// ═══ View Switch ═══
function switchView(v) {
  state.view = v;
  var btns = document.querySelectorAll('#viewToggle button');
  btns.forEach(function(b){ b.className = b.textContent.trim() === (v==='card'?'카드':'테이블') ? 'active' : ''; });
  renderContent();
}

// ═══ Media Modal ═══
function openMedia(type, title) {
  var modal = document.getElementById('mediaModal');
  var box = document.getElementById('modalBox');
  modal.className = 'modal-overlay';

  var icons = {image:'🖼️', video:'🎥', audio:'🎧'};
  var labels = {image:'이미지 미리보기', video:'영상 미리보기', audio:'음성 미리보기'};

  var h = '';
  h += '<div class="modal-header">';
  h += '<span class="modal-icon">'+icons[type]+'</span>';
  h += '<div class="modal-info"><div class="modal-title">'+labels[type]+'</div>';
  h += '<div class="modal-subtitle">'+title+'</div></div>';
  h += '<button class="modal-close" onclick="closeModal()">✕</button>';
  h += '</div>';
  h += '<div class="modal-body">';

  if(type === 'video') {
    h += '<div class="video-player">';
    h += '<div class="video-screen">';
    h += '<div class="play-btn"><svg viewBox="0 0 24 24" fill="#fff" width="24" height="24"><polygon points="6,4 20,12 6,20"/></svg></div>';
    h += '<div class="video-title-overlay">'+title+'</div>';
    h += '</div>';
    h += '<div class="video-controls">';
    h += '<button class="ctrl-play"><svg viewBox="0 0 24 24" fill="currentColor" width="10" height="10"><polygon points="6,4 20,12 6,20"/></svg>재생</button>';
    h += '<div class="progress-bar"><div class="progress-fill"></div></div>';
    h += '<span class="ctrl-time">0:00 / 12:34</span>';
    h += '</div></div>';
  } else if(type === 'audio') {
    h += '<div class="audio-player">';
    h += '<div class="audio-viz"><div class="audio-bars">';
    for(var i=0;i<5;i++) h += '<div class="audio-bar"></div>';
    h += '</div></div>';
    h += '<div class="audio-title">'+title+'</div>';
    h += '<div class="audio-sub">샘플 음성 플레이어</div>';
    h += '<div class="audio-controls">';
    h += '<button class="audio-play"><svg viewBox="0 0 24 24" fill="#fff" width="14" height="14"><polygon points="6,4 20,12 6,20"/></svg></button>';
    h += '<div class="progress-bar"><div class="progress-fill"></div></div>';
    h += '<span class="ctrl-time">0:00 / 3:24</span>';
    h += '</div></div>';
  } else {
    h += '<div class="image-viewer">';
    h += '<div class="image-placeholder">';
    h += '<svg viewBox="0 0 64 64" fill="none" stroke="#8E8E93" stroke-width="1.5" width="56" height="56"><rect x="6" y="10" width="52" height="40" rx="4"/><circle cx="22" cy="26" r="6"/><polyline points="6,42 20,30 30,38 44,22 58,36"/></svg>';
    h += '<div class="image-label">'+title+'</div>';
    h += '<div class="image-sub">샘플 이미지 미리보기</div>';
    h += '</div></div>';
  }

  h += '</div>';
  box.innerHTML = h;
}

function closeModal() {
  document.getElementById('mediaModal').className = 'modal-overlay hidden';
}

// ═══ Actions ═══
function handleReject() {
  if(confirm('반려 처리하시겠습니까?\n작업자에게 재작업 요청이 전달됩니다.')) {
    alert('반려 처리되었습니다.');
  }
}
function handleApprove() {
  if(confirm('검수 승인 처리하시겠습니까?')) {
    alert('검수 승인 완료');
  }
}

// ═══ Keyboard ═══
document.addEventListener('keydown', function(e) {
  if(e.key === 'Escape') closeModal();
  if(e.key === 'ArrowLeft') navPrev();
  if(e.key === 'ArrowRight') navNext();
});

// ═══ Init ═══
renderTree();
renderContent();
</script>

</html>
